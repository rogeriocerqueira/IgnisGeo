services:
  db:
    image: postgis/postgis:16-3.4
    container_name: ignisgeo_db
    environment:
      POSTGRES_DB: queimadas
      POSTGRES_USER: queimadas_user
      POSTGRES_PASSWORD: queimadas_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"   # ← era 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U queimadas_user -d queimadas"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ignisgeo_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: ignisgeo_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - ./data:/app/data
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgis://queimadas_user:queimadas_pass@db:5432/queimadas
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=True
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery:
    build: ./backend
    container_name: ignisgeo_celery
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
      - ./data:/app/data
    environment:
      - DATABASE_URL=postgis://queimadas_user:queimadas_pass@db:5432/queimadas
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - backend
      - redis

  frontend:
    image: node:20-alpine
    container_name: ignisgeo_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:8000   # ← era http://localhost:8000

volumes:
  pgdata:
